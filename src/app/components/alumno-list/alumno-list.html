<h2>Todos mis alumnos</h2>

<!-- Bucle para ver todos los alumnos -->
@for (alumno of alumnos; track $index) {
    
    <!-- Por cada alumno, el id le damos el enlace para su descripcion ( usando el ID ) -->
<p>
    <a [routerLink]="['/alumno', alumno.id]">
        ID: {{alumno.id}}
    </a>
</p>
<p>Nombre: {{alumno.nombre}}</p>
<p>Ipasen: {{alumno.ipasen}}</p>

}
